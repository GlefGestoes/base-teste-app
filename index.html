<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0B1F33">
  <meta name="description" content="AMZ App - Sistema de Gerenciamento de Geradores">
  
  <title>Login - AMZ App</title>
  
  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./assets/icons/logoamz.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <!-- Header -->
      <header class="login-header">
        <div class="login-logo">
          <div class="navbar-brand-icon">
			<img src="./assets/icons/logoamz.png" alt="Logo AMZ" class="navbar-logo">
		  </div>
          <span class="navbar-brand-text"><span></span></span>
        </div>
        <h1 class="login-title">Energia ininterrupta</h1>
        <p class="login-subtitle">Para o seu negócio</p>
      </header>

      <!-- Form -->
      <form id="loginForm" class="login-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">
            E-mail<span class="required">*</span>
          </label>
          <div class="input-group">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="seu@email.com"
              required
              autocomplete="email"
            >
          </div>
          <span id="emailError" class="form-error" style="display: none;"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">
            Senha<span class="required">*</span>
          </label>
          <div class="input-group">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="current-password"
            >
            <button type="button" id="togglePassword" class="input-toggle" aria-label="Mostrar senha">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span id="passwordError" class="form-error" style="display: none;"></span>
        </div>

        <!-- Options -->
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </span>
            Lembrar-me
          </label>
          <a href="#">Esqueci a senha</a>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">
          <span id="btnText">Entrar</span>
          <span id="btnSpinner" class="spinner" style="display: none;"></span>
        </button>
		  <p class="login-register">
			Não tem conta?
			<a href="./pages/cadastro.html">Criar conta</a>
		  </p>
        <!-- Divider -->
        <div class="divider">
          <span>ou continue com</span>
        </div>

        <!-- Social -->
        <div class="social-login">
          <button type="button" id="btnGoogle" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button type="button" id="btnApple" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zm-5.85-15.1c.07-2.04 1.76-3.79 3.78-3.94.29 2.32-1.93 4.48-3.78 3.94z"/>
            </svg>
            Apple
          </button>
        </div>
      </form>

      <!-- Footer -->
      <footer style="margin-top: var(--space-6); text-align: center; font-size: var(--text-xs); color: var(--text-muted);">
        <p>Ao entrar, você concorda com os <a href="#">Termos</a> e <a href="#">Privacidade</a></p>
        <p style="margin-top: var(--space-2);">v1.0.0</p>
      </footer>
    </div>
  </main>

  <!-- Scripts -->
  <script src="./config.js"></script>
  <script src="./js/utils/helpers.js"></script>
  <script src="./js/services/mock.service.js"></script>
  <script src="./js/services/api.service.js"></script>
  <script src="./js/services/auth.service.js"></script>
  <script src="./js/app.js"></script>

  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const togglePassword = document.getElementById('togglePassword');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');

      // Toggle password visibility
      togglePassword.addEventListener('click', () => {
        const type = password.type === 'password' ? 'text' : 'password';
        password.type = type;
      });

      // Load saved email
      const savedEmail = localStorage.getItem('amz_remember_email');
      if (savedEmail) {
        email.value = savedEmail;
        document.getElementById('rememberMe').checked = true;
      }

      function showError(element, message) {
        element.textContent = message;
        element.style.display = 'flex';
      }

      function hideErrors() {
        emailError.style.display = 'none';
        passwordError.style.display = 'none';
      }

      function setLoading(loading) {
        submitBtn.disabled = loading;
        btnText.style.display = loading ? 'none' : 'inline';
        btnSpinner.style.display = loading ? 'block' : 'none';
      }

      function validate() {
        hideErrors();
        let valid = true;

        if (!email.value.trim()) {
          showError(emailError, 'E-mail é obrigatório');
          valid = false;
        } else if (!Utils.isValidEmail(email.value)) {
          showError(emailError, 'E-mail inválido');
          valid = false;
        }

        if (!password.value) {
          showError(passwordError, 'Senha é obrigatória');
          valid = false;
        } else if (password.value.length < 6) {
          showError(passwordError, 'Senha deve ter pelo menos 6 caracteres');
          valid = false;
        }

        return valid;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!validate()) return;

        setLoading(true);

        const result = await AuthService.login(email.value.trim(), password.value);

        if (result.success) {
          // Save email if remember me
          if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('amz_remember_email', email.value.trim());
          } else {
            localStorage.removeItem('amz_remember_email');
          }
          
          AuthService.redirectAfterLogin();
        } else {
          showError(passwordError, result.error || 'Erro ao fazer login');
          setLoading(false);
        }
      });

      // Check if already logged in
      if (AuthService.isAuthenticated()) {
        AuthService.redirectAfterLogin();
      }
    })();
  </script>
</body>
</html>
