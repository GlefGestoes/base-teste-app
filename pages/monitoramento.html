  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">Monitoramento</h1>
      <p class="page-subtitle">Acompanhamento em tempo real</p>
    </header>

    <div style="padding: 0 var(--space-4);">
      <div style="display: flex; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap;">
        <select class="form-select" style="min-width: 150px;">
          <option value="">Todos os status</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
          <option value="alert">Alerta</option>
        </select>
        <select class="form-select" style="min-width: 150px;">
          <option value="">Todos os clientes</option>
          <option value="1">Indústria XYZ</option>
          <option value="2">Comércio ABC</option>
        </select>
      </div>

      <div class="grid grid-cols-1 grid-cols-md-2 grid-cols-lg-3" id="generatorsGrid">
        <!-- Generators loaded via JS -->
      </div>
    </div>
  </main>

  <script src="../config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/services/mock.service.js"></script>
  <script src="../js/services/api.service.js"></script>
  <script src="../js/services/auth.service.js"></script>
  <script src="../js/services/dse.service.js"></script>
  <script src="../js/app.js"></script>

  <script>
      (function() {
	
	  // ✅ 1. Proteção de rota
	  if (!AuthService.isAuthenticated()) {
	    window.location.href = '../index.html';
	    return;
	  }
		  
      const menuToggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');

      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('open');
      });

      sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      });

      async function loadGenerators() {
        const service = CONFIG.isDev() ? MockService : ApiService;
        
        try {
          const response = await service.getGenerators();
          
          if (response.success) {
            renderGenerators(response.data);
          }
        } catch (error) {
          console.error('Error loading generators:', error);
        }
      }

      function renderGenerators(generators) {
        const container = document.getElementById('generatorsGrid');
        
        container.innerHTML = generators.map(gen => `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${gen.name}</div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">${gen.client}</div>
              </div>
              <span class="badge badge-${gen.status}">${gen.status}</span>
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4); margin-bottom: var(--space-4);">
              <div class="stat-card">
                <div class="stat-icon ${gen.temperature > 90 ? 'error' : gen.temperature > 80 ? 'warning' : 'success'}">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>
                  </svg>
                </div>
                <div class="stat-value" style="font-size: var(--text-xl);">${gen.temperature}°C</div>
                <div class="stat-label">Temperatura</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon info">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                  </svg>
                </div>
                <div class="stat-value" style="font-size: var(--text-xl);">${gen.power}%</div>
                <div class="stat-label">Potência</div>
              </div>
            </div>
            <div style="background: var(--bg-input); border-radius: var(--radius-lg); padding: var(--space-3);">
              <div style="display: flex; justify-content: space-between; font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-2);">
                <span>Combustível</span>
                <span>${gen.fuel}%</span>
              </div>
              <div style="height: 8px; background: var(--color-gray-700); border-radius: var(--radius-full); overflow: hidden;">
                <div style="width: ${gen.fuel}%; height: 100%; background: ${gen.fuel < 20 ? 'var(--color-error)' : gen.fuel < 40 ? 'var(--color-warning)' : 'var(--color-success)'}; border-radius: var(--radius-full); transition: width 0.3s;"></div>
              </div>
            </div>
            <div style="display: flex; gap: var(--space-2); margin-top: var(--space-4);">
              <button class="btn btn-secondary" style="flex: 1;">Detalhes</button>
              <button class="btn btn-secondary" style="flex: 1;">Histórico</button>
            </div>
          </div>
        `).join('');
      }

      loadGenerators();
    })();
  </script>
