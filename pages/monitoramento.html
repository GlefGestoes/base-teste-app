  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">Monitoramento</h1>
      <p class="page-subtitle">Acompanhamento em tempo real</p>
    </header>

    <div style="padding: 0 var(--space-4);">

      <!-- Painel Gateway DSE -->
      <div id="gatewayPanel" style="display:none; margin-bottom: var(--space-4);">
        <div class="card" style="border-left: 3px solid var(--color-accent);">
          <div class="card-header" style="margin-bottom:8px;">
            <div class="card-title" style="font-size:14px;">🔌 Gateway DSE — <span id="gwSerial">—</span></div>
            <span id="gwUpdateTime" style="font-size:11px;color:var(--text-muted);"></span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:16px;font-size:13px;">
            <div>📶 <strong id="gwSignal">—</strong> (<span id="gwOperator">—</span>)</div>
            <div>🌐 IP: <strong id="gwIp">—</strong></div>
            <div>📡 MQTT: <strong id="gwMqtt">—</strong></div>
            <div>📍 GPS: <strong id="gwGps">—</strong></div>
          </div>
        </div>
      </div>

      <!-- Filtros -->
      <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;">
        <select id="filterStatus" class="form-select" style="min-width:150px;">
          <option value="">Todos os status</option>
          <option value="Online">Online</option>
          <option value="Offline">Offline</option>
          <option value="Aguardando">Aguardando</option>
        </select>
        <select id="filterClient" class="form-select" style="min-width:150px;">
          <option value="">Todos os clientes</option>
        </select>
      </div>

      <!-- Grid de geradores -->
      <div class="grid grid-cols-1 grid-cols-md-2 grid-cols-lg-3" id="generatorsGrid">
        <p style="color:var(--text-muted);padding:20px;">Carregando...</p>
      </div>
    </div>
  </main>

  <script src="../config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/services/mock.service.js"></script>
  <script src="../js/services/api.service.js"></script>
  <script src="../js/services/auth.service.js"></script>
  <script src="../js/services/dse.service.js"></script>
  <script src="../js/app.js"></script>

  <script>
  (function() {
    if (!AuthService.isAuthenticated()) {
      window.location.href = '../index.html';
      return;
    }

    // Sidebar
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    // Estado
    let allGenerators = [];
    let dseData       = null;

    // ─── DSE STATUS BADGE ────────────────────────────────────────────────
    const STATUS_COLOR = { online:'#10b981', offline:'#ef4444', syncing:'#f59e0b', error:'#ef4444' };

    function updateStatusBadge(status) {
      document.getElementById('dseStatusDot').style.background = STATUS_COLOR[status] || '#6b7280';
      document.getElementById('dseStatusText').textContent = {
        online:'Gateway Online', offline:'Gateway Offline',
        syncing:'Sincronizando…', error:'Erro de conexão'
      }[status] || 'Gateway';
    }

    // ─── PAINEL GATEWAY ──────────────────────────────────────────────────
    function updateGatewayPanel(data) {
      dseData = data;
      document.getElementById('gatewayPanel').style.display = 'block';
      document.getElementById('gwSerial').textContent    = data.device?.serial ?? '—';
      document.getElementById('gwIp').textContent        = data.gsm?.ip        ?? '—';
      document.getElementById('gwOperator').textContent  = data.gsm?.operator  ?? '—';
      document.getElementById('gwMqtt').textContent      = data.mqtt?.connected ? 'Conectado' : 'Desconectado';
      document.getElementById('gwUpdateTime').textContent = 'Atualizado: ' + new Date(data.capturedAt).toLocaleTimeString('pt-BR');

      const bars = ['○○○○○','●○○○○','●●○○○','●●●○○','●●●●○','●●●●●'];
      document.getElementById('gwSignal').textContent = (bars[data.gsm?.signal] || '—') + ' ' + (data.gsm?.type ?? '');
      document.getElementById('gwGps').textContent = data.gps?.hasFix
        ? `${data.gps.latitude?.toFixed(4)}, ${data.gps.longitude?.toFixed(4)}`
        : 'Sem sinal';

      // Atualiza status dos geradores pelo serial do módulo DSE
      const moduleMap = {};
      (data.modules ?? []).forEach(m => { if (m.serial) moduleMap[m.serial.toUpperCase()] = m; });

      allGenerators.forEach(g => {
        const mod = moduleMap[g.serial?.toUpperCase()];
        if (mod) {
          g.status   = mod.online ? 'Online' : 'Offline';
          g.firmware = mod.firmware || g.firmware;
          g.protocol = mod.protocol || g.protocol;
          // Coordenadas do módulo DSE
          g.dse_lat = mod.latitude;
          g.dse_lon = mod.longitude;
        }
      });

      renderGenerators(applyFilters());
    }

    // ─── FILTROS ─────────────────────────────────────────────────────────
    function applyFilters() {
      const status = document.getElementById('filterStatus').value;
      const client = document.getElementById('filterClient').value;
      return allGenerators.filter(g =>
        (!status || g.status === status) &&
        (!client || String(g.client_id) === client)
      );
    }

    document.getElementById('filterStatus').addEventListener('change', () => renderGenerators(applyFilters()));
    document.getElementById('filterClient').addEventListener('change', () => renderGenerators(applyFilters()));

    // ─── RENDER GERADORES ─────────────────────────────────────────────────
    function statusClass(s) {
      return s === 'Online' ? 'badge-online' : s === 'Offline' ? 'badge-offline' : 'badge-warning';
    }

    function renderGenerators(list) {
      const container = document.getElementById('generatorsGrid');
      if (!list.length) {
        container.innerHTML = '<p style="color:var(--text-muted);padding:20px;">Nenhum gerador encontrado.</p>';
        return;
      }

      container.innerHTML = list.map(g => {
        // Dados DSE do módulo correspondente
        const mod = dseData?.modules?.find(m => m.serial?.toUpperCase() === g.serial?.toUpperCase());
        const isOnline = g.status === 'Online';

        return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">${g.serial || '—'}</div>
              <div style="font-size:12px;color:#aaa;">${g.clientName || 'Sem cliente'}</div>
            </div>
            <span class="badge ${statusClass(g.status)}">${g.status || 'Aguardando'}</span>
          </div>

          <!-- Dados DSE em tempo real -->
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-3);margin:12px 0;">
            <div class="stat-card">
              <div class="stat-icon ${isOnline ? 'success' : 'error'}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
              </div>
              <div class="stat-value" style="font-size:var(--text-lg);">${isOnline ? 'Online' : 'Offline'}</div>
              <div class="stat-label">Conexão DSE</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon info">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 6l5 6-5 6M8 6h13M8 12h13M8 18h13"></path>
                </svg>
              </div>
              <div class="stat-value" style="font-size:var(--text-lg);">${g.protocol || mod?.protocol || 'RS485'}</div>
              <div class="stat-label">Protocolo</div>
            </div>
          </div>

          <!-- Info do módulo DSE -->
          <div style="background:var(--bg-input);border-radius:var(--radius-lg);padding:var(--space-3);font-size:13px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="color:var(--text-muted);">Módulo ID</span>
              <span>${g.module_id || '—'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="color:var(--text-muted);">Firmware</span>
              <span>${g.firmware || mod?.firmware || '—'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="color:var(--text-muted);">Local</span>
              <span>${g.local || '—'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="color:var(--text-muted);">Cidade/UF</span>
              <span>${g.cidade ? g.cidade + (g.uf ? ' - ' + g.uf : '') : '—'}</span>
            </div>
          </div>

          <!-- GPS do módulo DSE (se disponível) -->
          ${mod?.latitude ? `
          <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">
            📍 GPS: ${mod.latitude.toFixed(4)}, ${mod.longitude.toFixed(4)}
          </div>` : ''}

          <div style="display:flex;gap:8px;margin-top:12px;">
            <a href="../pages/geradores.html" class="btn btn-secondary" style="flex:1;text-align:center;">Gerenciar</a>
          </div>
        </div>`;
      }).join('');
    }

    // ─── CARREGAR DADOS ───────────────────────────────────────────────────
    async function loadGenerators() {
      try {
        const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
        const res  = await _svc.getGenerators();
        const raw  = res?.data ?? res;
        allGenerators = (Array.isArray(raw) ? raw : []).map(g => ({
          ...g,
          clientName: g.clients?.name || 'Sem cliente',
        }));

        // Popula filtro de clientes
        const clients = [...new Map(allGenerators.map(g => [g.client_id, g.clientName])).entries()];
        const selCli  = document.getElementById('filterClient');
        selCli.innerHTML = '<option value="">Todos os clientes</option>' +
          clients.filter(([id]) => id).map(([id, name]) => `<option value="${id}">${name}</option>`).join('');

        renderGenerators(applyFilters());

        // Avisa DSEService sobre o generator para polling
        if (window.CONFIG?.FEATURES?.DSE_INTEGRATION && window.DSEService) {
          const first = allGenerators.find(g => g.serial?.trim());
          if (first) {
            window.DSEService.setGenerator({ id: first.id, serial: first.serial, moduleId: first.module_id || '' });
          }
        }
      } catch (err) {
        console.error('[Monitoramento] Erro ao carregar geradores:', err);
        document.getElementById('generatorsGrid').innerHTML =
          '<p style="color:var(--text-muted);padding:20px;">Erro ao carregar geradores.</p>';
      }
    }

    // ─── INTEGRAÇÃO DSE ───────────────────────────────────────────────────
    if (window.CONFIG?.FEATURES?.DSE_INTEGRATION && window.DSEService) {
      window.DSEService.onStatus(updateStatusBadge);
      window.DSEService.onData(updateGatewayPanel);

      if (window.CONFIG?.DSE?.AUTO_POLL) {
        window.DSEService.startPolling(null, window.CONFIG?.DSE?.POLL_INTERVAL || 10000);
      }
    }

    window.addEventListener('beforeunload', () => {
      if (window.DSEService) window.DSEService.destroy();
    });

    loadGenerators();
  })();
  </script>
</body>
