<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta - AMZ App</title>

<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="login-page">

  <div class="login-card">

    <div class="login-header">

      <div class="login-logo">
        <img src="../assets/icons/logoamz.png" alt="Logo AMZ" class="navbar-logo">
      </div>

      <h1 class="login-title">Criar Conta</h1>
      <p class="login-subtitle">Cadastre-se para acessar o sistema - AMZ app</p>

    </div>

    <form id="registerForm" class="login-form">

      <div class="form-group">
        <label for="name" class="form-label">Nome</label>
        <input
          type="text"
          id="name"
          class="form-input"
          placeholder="Digite seu nome"
          required
        >
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="Digite seu email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Digite sua senha"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirmar senha</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-input"
          placeholder="Confirme sua senha"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-lg">
        Criar Conta
      </button>

    </form>

    <div class="divider">
      <span>ou</span>
    </div>

    <p class="text-center">
      Já possui conta?
      <a href="../index.html">Fazer login</a>
    </p>

  </div>

</div>

<script src="../config.js"></script>
<script src="../js/utils/helpers.js"></script>
<script src="../js/services/mock.service.js"></script>
<script src="../js/services/api.service.js"></script>
<script src="../js/services/auth.service.js"></script>
<script src="../js/register.js"></script>

</body>
</html>
