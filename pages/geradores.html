<!-- MODAL -->
<div id="generatorModal" class="modal">
  <div class="modal-container">

    <div class="modal-header">
      <h2 id="modalTitle">Novo Gerador</h2>
      <button id="closeModal" class="btn btn-secondary btn-sm">X</button>
    </div>

    <div class="modal-body">

      <form id="generatorForm" class="login-form">

        <div class="form-group">
          <label class="form-label">Serial *</label>
          <input type="text" id="genSerial" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Cliente *</label>
          <select id="genClient" class="form-select"></select>
        </div>

        <div class="form-group">
          <label class="form-label">Local</label>
          <input type="text" id="genLocal" class="form-input">
        </div>

        <div class="form-grid-3">
          <div class="form-group">
            <label class="form-label">Cidade</label>
            <input type="text" id="genCidade" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">UF</label>
            <input type="text" id="genUF" class="form-input" maxlength="2">
          </div>

          <div class="form-group">
            <label class="form-label">CEP</label>
            <input type="text" id="genCEP" class="form-input">
          </div>
        </div>

      </form>

    </div>

    <div class="modal-footer">
      <button id="btnCancel" class="btn btn-secondary">Cancelar</button>
      <button form="generatorForm" class="btn btn-primary">Salvar</button>
    </div>

  </div>
</div>

  <script src="../config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/services/mock.service.js"></script>
  <script src="../js/services/api.service.js"></script>
  <script src="../js/services/auth.service.js"></script>
  <script src="../js/app.js"></script>

<script>
(function(){

  // ===============================
  // ELEMENTOS
  // ===============================
  const modal = document.getElementById('generatorModal');
  const form = document.getElementById('generatorForm');
  const grid = document.getElementById('generatorsGrid');
  const searchInput = document.getElementById('searchInput');

  const fields = {
    serial: document.getElementById("genSerial"),
    client: document.getElementById("genClient"),
    local: document.getElementById("genLocal"),
    cidade: document.getElementById("genCidade"),
    uf: document.getElementById("genUF"),
    cep: document.getElementById("genCEP")
  };

  // ===============================
  // DADOS MOCK (mesmo padrão clientes)
  // ===============================
  window.clients = [
    { id: 1, name: "Empresa X" },
    { id: 2, name: "Indústria Y" }
  ];

  window.generators = [];

  let currentIndex = null;

  // ===============================
  // LOAD CLIENTS
  // ===============================
  function loadClients(){
    fields.client.innerHTML = `
      <option value="">Selecione</option>
      ${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join("")}
    `;
  }

  // ===============================
  // MODAL
  // ===============================
  function openModal(index = null){

    form.reset();
    modal.style.display = "flex";

    currentIndex = index;

    if(index !== null){
      const g = generators[index];

      fields.serial.value = g.serial;
      fields.client.value = g.clientId;
      fields.local.value = g.local;
      fields.cidade.value = g.cidade;
      fields.uf.value = g.uf;
      fields.cep.value = g.cep;
    }
  }

  function closeModal(){
    modal.style.display = "none";
    currentIndex = null;
  }

  // ===============================
  // SALVAR
  // ===============================
  form.addEventListener("submit", (e)=>{
    e.preventDefault();

    const data = {
      serial: fields.serial.value.trim(),
      clientId: Number(fields.client.value),
      clientName: clients.find(c => c.id == fields.client.value)?.name || "",
      local: fields.local.value.trim(),
      cidade: fields.cidade.value.trim(),
      uf: fields.uf.value.trim(),
      cep: fields.cep.value.trim(),
      status: "Ativo"
    };

    if(currentIndex === null){
      generators.unshift(data);
    } else {
      generators[currentIndex] = data;
    }

    render(generators);
    closeModal();
  });

  // ===============================
  // BUSCA
  // ===============================
  searchInput.addEventListener("input", (e)=>{
    const term = e.target.value.toLowerCase();

    const filtered = generators.filter(g =>
      g.serial.toLowerCase().includes(term) ||
      g.clientName.toLowerCase().includes(term)
    );

    render(filtered);
  });

  // ===============================
  // RENDER
  // ===============================
  function render(list){

    if(list.length === 0){
      grid.innerHTML = `<p style="padding:20px;">Nenhum gerador encontrado</p>`;
      return;
    }

    grid.innerHTML = list.map((g, index)=>`
      <div class="card">

        <div class="card-header">
          <div>
            <div class="card-title">${g.serial}</div>
            <div style="font-size:12px;color:#aaa;">${g.clientName}</div>
          </div>
          <span class="badge badge-online">${g.status}</span>
        </div>

        <div style="font-size:14px;color:#ccc;">
          📍 ${g.local || "Sem local"}<br>
          ${g.cidade} - ${g.uf}
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-secondary" style="flex:1;" onclick="edit(${index})">
            Editar
          </button>
        </div>

      </div>
    `).join("");
  }

  // ===============================
  // AÇÕES
  // ===============================
  window.edit = (index) => openModal(index);

  document.getElementById("btnNovo").onclick = () => openModal();
  document.getElementById("closeModal").onclick = closeModal;
  document.getElementById("btnCancel").onclick = closeModal;

  // Sidebar
  document.getElementById('menuToggleNavbar').onclick = () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  };

  document.getElementById('sidebarOverlay').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  };

  // INIT
  loadClients();
  render(generators);

})();
</script>
