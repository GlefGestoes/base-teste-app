<!-- MAIN -->
<div class="main-wrapper">
  <main class="main-content">

    <header class="header">
      <input type="text" id="searchInput" placeholder="Buscar gerador..." class="form-input search-input">
      <button id="btnNovo" class="btn btn-primary">+ Novo Gerador</button>
    </header>

    <!-- Painel do Gateway DSE (aparece somente quando conectado) -->
    <div id="gatewayPanel" style="display:none; padding: 0 0 16px 0;">
      <div class="card" style="border-left: 3px solid var(--color-accent);">
        <div class="card-header" style="margin-bottom: 8px;">
          <div class="card-title" style="font-size:14px;">
            🔌 Gateway DSE — <span id="gwSerial">...</span>
          </div>
          <span id="gwUpdateTime" style="font-size:11px; color:var(--text-muted);"></span>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:16px; font-size:13px;">
          <div>📶 <strong id="gwSignal">—</strong> (<span id="gwOperator">—</span>)</div>
          <div>🌐 IP: <strong id="gwIp">—</strong></div>
          <div>📡 MQTT: <strong id="gwMqtt">—</strong></div>
          <div>📍 GPS: <strong id="gwGps">—</strong></div>
        </div>
      </div>
    </div>

    <!-- Grid de geradores -->
    <div id="generatorsGrid" class="grid"></div>

  </main>
</div>

<!-- MODAL CADASTRO/EDIÇÃO -->
<div id="generatorModal" class="modal">
  <div class="modal-container">
    <div class="modal-header">
      <h2 id="modalTitle">Novo Gerador</h2>
      <button id="closeModal" class="btn btn-secondary btn-sm">X</button>
    </div>
    <div class="modal-body">
      <form id="generatorForm" class="login-form">
        <div class="form-group">
          <label class="form-label">Serial *</label>
          <input type="text" id="genSerial" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Module ID *</label>
          <input type="text" id="genModuleId" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Cliente *</label>
          <select id="genClient" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Local</label>
          <input type="text" id="genLocal" class="form-input">
        </div>
        <div class="form-grid-3">
          <div class="form-group">
            <label class="form-label">Cidade</label>
            <input type="text" id="genCidade" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">UF</label>
            <input type="text" id="genUF" class="form-input" maxlength="2">
          </div>
          <div class="form-group">
            <label class="form-label">CEP</label>
            <input type="text" id="genCEP" class="form-input">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button id="btnCancel" class="btn btn-secondary">Cancelar</button>
      <button form="generatorForm" class="btn btn-primary">Salvar</button>
    </div>
  </div>
</div>

<script src="../config.js"></script>
<script src="../js/utils/helpers.js"></script>
<script src="../js/services/mock.service.js"></script>
<script src="../js/services/api.service.js"></script>
<script src="../js/services/auth.service.js"></script>
<script src="../js/services/dse.service.js"></script>
<script src="../js/app.js"></script>

<script>
(function () {

  // ✅ 1. Proteção de rota
  if (!AuthService.isAuthenticated()) {
    window.location.href = '../index.html';
    return;
  }

  // =============================================
  // ELEMENTOS
  // =============================================
  const modal       = document.getElementById('generatorModal');
  const form        = document.getElementById('generatorForm');
  const grid        = document.getElementById('generatorsGrid');
  const searchInput = document.getElementById('searchInput');

  const fields = {
    serial: document.getElementById('genSerial'),
    moduleId: document.getElementById('genModuleId'),
    client: document.getElementById('genClient'),
    local:  document.getElementById('genLocal'),
    cidade: document.getElementById('genCidade'),
    uf:     document.getElementById('genUF'),
    cep:    document.getElementById('genCEP'),
  };

  // =============================================
  // DADOS
  // =============================================
  window.clients = []; // aqui será preenchido pela API
  
  async function loadClientsFromAPI() {
    try {
      const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
      const response = await _svc.getClients();
      const raw = response?.data ?? response;
      window.clients = Array.isArray(raw) ? raw : [];
      loadClients();
    } catch (err) {
      console.error('Erro ao carregar clientes:', err);
    }
  }

  // Carrega geradores salvos no localStorage para persistência
  window.generators = []; // começa vazio

  async function loadGeneratorsFromAPI() {
    try {
      const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
      const response = await _svc.getGenerators();
      const data = response?.data ?? response;

      window.generators = (Array.isArray(data) ? data : []).map(g => ({
        ...g,
        // Garante o nome para o Card/Busca
        clientName: g.clients?.name || 'Sem cliente',
        // Garante o ID para o campo Select no Modal de Edição
        clientId: g.client_id || (g.clients ? g.clients.id : null)
      }));

      render(window.generators);
    } catch (err) {
      console.error('Erro ao carregar geradores:', err);
      render([]);
    }
  }
  
  let currentIndex = null;

  // =============================================
  // INTEGRAÇÃO DSE GATEWAY
  // =============================================

  // Elementos do painel do gateway
  const gatewayPanel = document.getElementById('gatewayPanel');
  const statusDot    = document.getElementById('dseStatusDot');
  const statusText   = document.getElementById('dseStatusText');

  // Mapa de cores para status
  const STATUS_COLOR = {
    online:   '#10b981', // verde
    offline:  '#ef4444', // vermelho
    retrying: '#f59e0b', // amarelo
  };

  /**
   * Atualiza o badge de status no navbar
   */
  function updateStatusBadge(status) {
    statusDot.style.background  = STATUS_COLOR[status] || '#6b7280';
    statusText.textContent = {
      online:   'Gateway Online',
      offline:  'Gateway Offline',
      retrying: 'Reconectando…',
    }[status] || 'Gateway';
  }

  /**
   * Atualiza o painel informativo do gateway
   * e sincroniza o status online/offline dos geradores cadastrados
   */
  function onGatewayData(data) {
    // Mostra painel
    gatewayPanel.style.display = 'block';

    // Preenche dados do gateway
    document.getElementById('gwSerial').textContent   = data.device.serial;
    document.getElementById('gwIp').textContent       = data.gsm.ip;
    document.getElementById('gwOperator').textContent = data.gsm.operator;
    document.getElementById('gwMqtt').textContent     = data.mqtt.connected ? 'Conectado' : 'Desconectado';
    document.getElementById('gwUpdateTime').textContent =
      'Atualizado: ' + new Date(data.capturedAt).toLocaleTimeString('pt-BR');

    // Sinal GSM: converte 0–5 em barras
    const bars = ['○○○○○','●○○○○','●●○○○','●●●○○','●●●●○','●●●●●'];
    document.getElementById('gwSignal').textContent =
      (bars[data.gsm.signal] || '—') + ' ' + data.gsm.type;

    // GPS
    document.getElementById('gwGps').textContent = data.gps.hasFix
      ? `${data.gps.latitude?.toFixed(4)}, ${data.gps.longitude?.toFixed(4)}`
      : 'Sem sinal';

    // Atualiza status online/offline de cada gerador cadastrado
    // cruzando pelo serial com os módulos DSE
    const moduleMap = {};
    data.modules.forEach(m => {
      if (m.serial) moduleMap[m.serial.toUpperCase()] = m;
    });

    let changed = false;
    generators.forEach(g => {
      const mod = moduleMap[g.serial?.toUpperCase()];
      if (mod) {
        const novoStatus = mod.online ? 'Online' : 'Offline';
        if (g.status !== novoStatus) {
          g.status = novoStatus;
          g.firmware = mod.firmware;
          g.protocol = mod.protocol;
          changed = true;
        }
      }
    });

    if (changed) {
      localStorage.setItem('amz_generators', JSON.stringify(generators));
      render(generators);
    }
  }

  // Inicia integração DSE se feature flag ativa
  if (window.CONFIG?.FEATURES?.DSE_INTEGRATION && window.DSEService) {
    window.DSEService.onStatus(updateStatusBadge);
    window.DSEService.onData(onGatewayData);

    if (window.CONFIG?.DSE?.AUTO_POLL) {
      window.DSEService.startPolling(null, window.CONFIG?.DSE?.POLL_INTERVAL || 10000);
    }
  }

  // =============================================
  // CLIENTES
  // =============================================
  function loadClients() {
    fields.client.innerHTML =
      '<option value="">Selecione</option>' +
      clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  }

  // =============================================
  // MODAL
  // =============================================
  function openModal(index = null) {
    form.reset();
    modal.style.display = 'flex';
    currentIndex = index;

    document.getElementById('modalTitle').textContent =
      index !== null ? 'Editar Gerador' : 'Novo Gerador';

    if (index !== null) {
      const g = generators[index];
      fields.serial.value = g.serial;
      fields.moduleId.value = g.module_id || '';
      fields.client.value = g.clientId;
      fields.local.value  = g.local;
      fields.cidade.value = g.cidade;
      fields.uf.value     = g.uf;
      fields.cep.value    = g.cep;
    }
  }

  function closeModal() {
    modal.style.display = 'none';
    currentIndex = null;
  }

  // =============================================
  // SALVAR
  // =============================================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

  // ✅ VALIDAÇÃO - Clientes.
    if (!fields.client.value) {
      alert('Selecione um cliente antes de salvar.');
      return;
    }

    const data = {
      serial:      fields.serial.value.trim(),
      module_id:   fields.moduleId.value.trim(),
      client_id: parseInt(fields.client.value, 10) || null,
      local:       fields.local.value.trim(),
      cidade:      fields.cidade.value.trim(),
      uf:          fields.uf.value.trim(),
      cep:         fields.cep.value.trim(),
      status:      'Aguardando',
      firmware:    '',
      protocol:    '',
    };

    if (currentIndex === null) {
      try {
        const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
        await _svc.createGenerator(data);
      } catch (err) {
        alert('Erro ao salvar gerador: ' + err.message);
        return;
      }
    } else {
      try {
        const g = generators[currentIndex];
        const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
        await _svc.updateGenerator(g.id, data);
      } catch (err) {
        alert('Erro ao atualizar gerador: ' + err.message);
        return;
      }
    }

    await loadGeneratorsFromAPI(); // fonte de verdade é o banco
    closeModal();
  });

  // =============================================
  // BUSCA
  // =============================================
  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = generators.filter(g =>
      g.serial.toLowerCase().includes(term) ||
      g.clientName.toLowerCase().includes(term) ||
      (g.local || '').toLowerCase().includes(term)
    );
    render(filtered);
  });

  // =============================================
  // RENDER
  // =============================================
  function statusClass(status) {
    const map = {
      'Online':    'badge-online',
      'Offline':   'badge-offline',
      'Aguardando':'badge-warning',
    };
    return map[status] || 'badge-warning';
  }

  function render(list) {
    if (list.length === 0) {
      grid.innerHTML = `<p style="padding:20px; color:var(--text-muted);">
        Nenhum gerador encontrado. Clique em "+ Novo Gerador" para cadastrar.
      </p>`;
      return;
    }

    grid.innerHTML = list.map((g, index) => `
      <div class="card">

        <div class="card-header">
          <div>
            <div class="card-title">${g.serial} <small>(${g.module_id || ''})</small></div>
            <div style="font-size:12px;color:#aaa;">${g.clientName}</div>
          </div>
          <span class="badge ${statusClass(g.status)}">${g.status}</span>
        </div>

        <div style="font-size:13px;color:#ccc; margin: 8px 0;">
          📍 ${g.local || 'Sem local definido'}<br>
          ${g.cidade ? g.cidade + (g.uf ? ' - ' + g.uf : '') : ''}
        </div>

        ${g.firmware ? `
        <div style="font-size:11px;color:var(--text-muted); margin-bottom:8px;">
          Firmware: ${g.firmware} &nbsp;|&nbsp; ${g.protocol}
        </div>` : ''}

        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-secondary" style="flex:1;" onclick="editGenerator(${index})">
            Editar
          </button>
          <button onclick="handleDeleteGenerator(${index})"
            style="background:none; border:1px solid #EF4444; color:#EF4444;
                   padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px;">
            Excluir
          </button>
        </div>

      </div>
    `).join('');
  }

  // =============================================
  // AÇÕES GLOBAIS
  // =============================================
  window.editGenerator = (index) => openModal(index);

  document.getElementById('btnNovo').onclick    = () => openModal();
  document.getElementById('closeModal').onclick = closeModal;
  document.getElementById('btnCancel').onclick  = closeModal;

  // Sidebar
  document.getElementById('menuToggleNavbar').onclick = () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  };
  document.getElementById('sidebarOverlay').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  };

  // =============================================
  // FUNÇÃO DE DELETAR GERADORES (Restaurada)
  // =============================================
  async function handleDeleteGenerator(index) {
    // Busca o gerador no array global usando o index passado pelo botão
    const g = window.generators[index];
    if (!g) return;

    if (!confirm(`Excluir o gerador "${g.serial}"? Esta ação não pode ser desfeita.`)) return;

    try {
      const _svc = window.CONFIG?.isDev() ? window.MockService : window.ApiService;
      await _svc.deleteGenerator(g.id);
      // Após deletar no banco, recarregamos a lista da API para garantir sincronia
      await loadGeneratorsFromAPI();
    } catch (err) {
      console.error('Erro ao excluir:', err);
      alert('Erro ao excluir: ' + err.message);
    }
  }
  
  // Expõe para o window para o onclick do HTML encontrar
  window.handleDeleteGenerator = handleDeleteGenerator;

  // =============================================
  // INIT 
  // =============================================
  window.addEventListener('beforeunload', () => {
    if (window.DSEService) window.DSEService.destroy();
  });

  async function init() {
    try {
      // 1. Carrega clientes (essencial para o nome aparecer no render e no select)
      await loadClientsFromAPI(); 
      
      // 2. Carrega geradores (que já chama o render() internamente)
      await loadGeneratorsFromAPI();
      
      console.log("Página de geradores inicializada.");
    } catch (err) {
      console.error("Erro na inicialização:", err);
    }
  }

  // Única chamada de inicialização
  init();

})();
  
</script>

</body>
</html>
