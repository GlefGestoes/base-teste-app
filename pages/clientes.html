  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">Clientes</h1>
      <p class="page-subtitle">Gerenciamento de clientes e contratos</p>
    </header>

    <div style="padding: 0 var(--space-4);">
      <!-- Actions -->
      <div style="display: flex; gap: var(--space-3); margin-bottom: var(--space-6); flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <div class="input-group">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </span>
            <input type="text" class="form-input" placeholder="Buscar cliente..." id="searchInput">
          </div>
        </div>
        <select class="form-select" style="min-width: 150px;">
          <option value="">Todos os tipos</option>
          <option value="empresa">Empresa</option>
          <option value="instituicao">Instituição</option>
        </select>
        <button class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Novo Cliente
        </button>
      </div>

      <!-- Clients Grid -->
      <div class="grid grid-cols-1 grid-cols-md-2 grid-cols-lg-3" id="clientsGrid">
        <!-- Clients loaded via JS -->
      </div>
    </div>
  </main>

  <script src="../config.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/services/mock.service.js"></script>
  <script src="../js/services/api.service.js"></script>
  <script src="../js/services/auth.service.js"></script>
  <script src="../js/app.js"></script>

  <script>
    (function() {
      const menuToggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');

      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('open');
      });

      sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      });

      async function loadClients() {
        const service = CONFIG.isDev() ? MockService : ApiService;
        
        try {
          const response = await service.getClients();
          
          if (response.success) {
            renderClients(response.data);
          }
        } catch (error) {
          console.error('Error loading clients:', error);
        }
      }

      function renderClients(clients) {
        const container = document.getElementById('clientsGrid');
        
        container.innerHTML = clients.map(client => `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${client.name}</div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">${client.document}</div>
              </div>
              <span class="badge badge-${client.contract === 'Ativo' ? 'online' : 'offline'}">${client.contract}</span>
            </div>
            <div style="margin-bottom: var(--space-4);">
              <div style="display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); font-size: var(--text-sm);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                ${client.phone}
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); font-size: var(--text-sm);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted);">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                ${client.email}
              </div>
              <div style="display: flex; align-items: flex-start; gap: var(--space-2); font-size: var(--text-sm); color: var(--text-secondary);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--text-muted); flex-shrink: 0;">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
                ${client.address}
              </div>
            </div>
            <div style="display: flex; gap: var(--space-2); padding-top: var(--space-4); border-top: 1px solid var(--glass-border);">
              <div style="flex: 1; text-align: center;">
                <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-accent);">${client.generators}</div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">Geradores</div>
              </div>
              <div style="flex: 1; text-align: center;">
                <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--color-info);">${client.type === 'empresa' ? 'PJ' : 'Org'}</div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">Tipo</div>
              </div>
            </div>
            <div style="display: flex; gap: var(--space-2); margin-top: var(--space-4);">
              <button class="btn btn-secondary" style="flex: 1;">Editar</button>
              <button class="btn btn-primary" style="flex: 1;">Detalhes</button>
            </div>
          </div>
        `).join('');
      }

      loadClients();
    })();
  </script>
